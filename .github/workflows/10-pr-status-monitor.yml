name: "10 PR Status Monitor"

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to evaluate (leave empty to scan ALL open PRs)"
        required: false
        type: string

permissions:
  pull-requests: write
  issues: write
  checks: read
  contents: read

concurrency:
  group: pr-status-monitor-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  monitor:
    name: Monitor CI Checks & Label PR
    runs-on: ubuntu-latest
    steps:
      - name: Wait 5 minutes for all checks to register
        if: github.event_name == 'pull_request_target'
        run: |
          echo "⏳ Waiting 5 minutes for all CI checks to spin up and register..."
          sleep 300
          echo "✅ Done waiting. Now polling check results..."

      - name: Evaluate all checks and label PR
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;

            // ─── Resolve which PRs to process ──────────────────────────────────
            let prsToProcess = [];

            if (context.eventName === 'pull_request_target') {
              // Triggered by a PR event — process that single PR
              const pr = context.payload.pull_request;
              // Re-fetch to get the mergeable field (payload may not have it)
              const { data: fullPr } = await github.rest.pulls.get({ owner, repo, pull_number: pr.number });
              prsToProcess = [{ number: fullPr.number, headSha: fullPr.head.sha, assignees: fullPr.assignees, author: fullPr.user.login, mergeable: fullPr.mergeable }];
            } else {
              // Triggered manually via workflow_dispatch
              const inputPrNumber = context.payload.inputs?.pr_number;
              if (inputPrNumber && inputPrNumber.trim() !== '') {
                // Specific PR number was provided
                const { data: prData } = await github.rest.pulls.get({ owner, repo, pull_number: parseInt(inputPrNumber) });
                prsToProcess = [{ number: prData.number, headSha: prData.head.sha, assignees: prData.assignees, author: prData.user.login, mergeable: prData.mergeable }];
              } else {
                // No PR number provided — fetch ALL open PRs
                // Must use pulls.get() per PR to get the mergeable field
                let page = 1;
                let listedPRs = [];
                while (true) {
                  const { data: openPRs } = await github.rest.pulls.list({ owner, repo, state: 'open', per_page: 100, page });
                  listedPRs = listedPRs.concat(openPRs);
                  if (openPRs.length < 100) break;
                  page++;
                }
                console.log(`Found ${listedPRs.length} open PRs. Fetching full details for mergeable status...`);
                for (const p of listedPRs) {
                  try {
                    const { data: fullPr } = await github.rest.pulls.get({ owner, repo, pull_number: p.number });
                    prsToProcess.push({ number: fullPr.number, headSha: fullPr.head.sha, assignees: fullPr.assignees, author: fullPr.user.login, mergeable: fullPr.mergeable });
                  } catch(e) {
                    console.error(`Could not fetch full data for PR #${p.number}: ${e.message}`);
                    prsToProcess.push({ number: p.number, headSha: p.head.sha, assignees: p.assignees, author: p.user.login, mergeable: null });
                  }
                }
                console.log(`Loaded full details for ${prsToProcess.length} PRs.`);
              }
            }

            // ─── Helper function: evaluate + label a single PR ──────────────────
            async function evaluatePR({ number: prNumber, headSha, assignees, author, mergeable }) {
              console.log(`\n🔍 Evaluating PR #${prNumber} (SHA: ${headSha})...`);

              // ─── 1. Fetch ALL check runs for this commit ──────────────────────
              let allCheckRuns = [];
              let checkPage = 1;
              while (true) {
                const { data } = await github.rest.checks.listForRef({
                  owner,
                  repo,
                  ref: headSha,
                  per_page: 100,
                  page: checkPage,
                });
                allCheckRuns = allCheckRuns.concat(data.check_runs);
                if (data.check_runs.length < 100) break;
                checkPage++;
              }

              // ─── 2. Filter out this workflow itself and Vercel ─────────────────
              const relevantChecks = allCheckRuns.filter((check) => {
                const name = check.name.toLowerCase();
                return (
                  !name.includes("vercel") &&
                  !name.includes("pr status monitor") &&
                  !name.includes("monitor ci checks")
                );
              });

              if (relevantChecks.length === 0) {
                console.log(`PR #${prNumber}: No relevant checks found yet. Skipping.`);
                return;
              }

              console.log(`PR #${prNumber}: Found ${relevantChecks.length} relevant checks.`);

              // ─── 3. Separate failing and pending checks ────────────────────────
              const failedChecks = relevantChecks.filter((check) => {
                const conclusion = (check.conclusion || "").toLowerCase();
                const status = (check.status || "").toLowerCase();
                return (
                  conclusion === "failure" ||
                  conclusion === "cancelled" ||
                  conclusion === "timed_out" ||
                  (status === "completed" && conclusion === "action_required")
                );
              });

              const pendingChecks = relevantChecks.filter((check) => check.status !== "completed");

              // ─── 4. Get the PR assignee (fallback to PR author) ───────────────
              const targetUser = (assignees || []).length > 0 ? assignees[0].login : author;

              // ─── 5. Get existing labels on this PR ────────────────────────────
              const { data: currentLabels } = await github.rest.issues.listLabelsOnIssue({
                owner, repo, issue_number: prNumber,
              });
              const currentLabelNames = currentLabels.map((l) => l.name);

              const addLabel = async (label) => {
                if (!currentLabelNames.includes(label)) {
                  await github.rest.issues.addLabels({ owner, repo, issue_number: prNumber, labels: [label] });
                  currentLabelNames.push(label);
                }
              };
              const removeLabel = async (label) => {
                if (currentLabelNames.includes(label)) {
                  try {
                    await github.rest.issues.removeLabel({ owner, repo, issue_number: prNumber, name: label });
                  } catch (e) { console.log(`Could not remove label "${label}": ${e.message}`); }
                }
              };

              // ─── 6a. MERGE CONFLICT CHECK (highest priority) ──────────────────
              // mergeable: true = clean, false = has conflicts, null = still computing
              if (mergeable === false) {
                await removeLabel("Blue");
                await addLabel("Red");

                const conflictBody =
                  `## ⚠️ Merge Conflicts Detected!\n\n` +
                  `Hey @${targetUser}, this PR has **merge conflicts** with the base branch and cannot be merged until they are resolved. 🙏\n\n` +
                  `### 🛠️ How to Resolve\n\n` +
                  `You can resolve conflicts directly in the browser by clicking the **\"Resolve conflicts\"** button on the PR page, or locally via the command line:\n\n` +
                  `\`\`\`bash\n` +
                  `# Sync your branch with the latest main\n` +
                  `git checkout main\n` +
                  `git pull origin main\n` +
                  `git checkout your-branch-name\n` +
                  `git merge main\n` +
                  `# Resolve the conflicts in your editor, then:\n` +
                  `git add .\n` +
                  `git commit -m "fix: resolve merge conflicts"\n` +
                  `git push\n` +
                  `\`\`\`\n\n` +
                  `---\n` +
                  `_Once conflicts are resolved and all CI checks pass, the **Red** label will automatically be replaced with **Blue**! 💙_`;

                await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body: conflictBody });
                console.log(`⚠️ PR #${prNumber} labeled "Red" — merge conflicts detected.`);
                return;
              }

              if (mergeable === null) {
                console.log(`PR #${prNumber}: GitHub is still computing mergeability. Skipping conflict check for now.`);
              }

              // ─── 6b. Still pending CI? Log and skip ───────────────────────────
              if (pendingChecks.length > 0 && failedChecks.length === 0) {
                const names = pendingChecks.map((c) => `\`${c.name}\``).join(", ");
                console.log(`PR #${prNumber}: Checks still pending: ${names}. Skipping.`);
                return;
              }

              // ─── 7. FAILURE PATH ───────────────────────────────────────────────
              if (failedChecks.length > 0) {
                await removeLabel("Blue");
                await addLabel("Red");

                const failedRows = failedChecks.map((check) => {
                  const link = check.html_url ? `[View Run](${check.html_url})` : "N/A";
                  return `| ❌ \`${check.name}\` | ${check.conclusion || 'unknown'} | ${link} |`;
                }).join("\n");

                const fixHints = failedChecks.map((check) => {
                  const name = check.name.toLowerCase();
                  if (name.includes("lint")) return "- **Lint Error:** Run `npm run lint` locally and fix all reported issues.";
                  if (name.includes("format") || name.includes("prettier")) return "- **Format Error:** Run `npx prettier --write .` to auto-format your code.";
                  if (name.includes("build")) return "- **Build Error:** Run `npm run build` locally to reproduce and fix the build error.";
                  if (name.includes("codeql") || name.includes("security")) return "- **Security Scan:** Check the CodeQL report in the Security tab for vulnerability details.";
                  if (name.includes("pr validation") || name.includes("pr check")) return "- **PR Validation:** Ensure your PR description links an issue (e.g., `Closes #123`) and has a clear description.";
                  return `- **\`${check.name}\`:** Check the [workflow run logs](${check.html_url}) for details.`;
                });

                const body =
                  `## ❌ CI Checks Failing on this PR\n\n` +
                  `Hey @${targetUser}, one or more automated checks are failing on your latest push. Please review the details below and push a fix. 🙏\n\n` +
                  `### Failed Checks\n\n| Check | Status | Link |\n|---|---|---|\n${failedRows}\n\n` +
                  `### 🛠️ How to Fix\n\n${fixHints.join("\n")}\n\n` +
                  `---\n_Once you push a fix, this check will re-run automatically. The **Red** label will be replaced with **Blue** when everything passes! 💙_`;

                await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body });
                console.log(`❌ PR #${prNumber} labeled "Red" — ${failedChecks.length} check(s) failed.`);
                return;
              }

              // ─── 8. SUCCESS PATH ───────────────────────────────────────────────
              await removeLabel("Red");
              await addLabel("Blue");

              const passedRows = relevantChecks
                .map((check) => `| ✅ \`${check.name}\` | ${check.conclusion} |`).join("\n");

              const successBody =
                `## ✅ All CI Checks Passing!\n\n` +
                `Great work, @${targetUser}! 🎉 Every automated check on this PR has passed successfully.\n\n` +
                `### Passed Checks\n\n| Check | Status |\n|---|---|\n${passedRows}\n\n` +
                `---\n_This PR is now labeled **Blue** and is ready for a maintainer review! 🚀_`;

              await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body: successBody });
              console.log(`✅ PR #${prNumber} labeled "Blue" — all checks passed!`);
            }

            // ─── Process all PRs sequentially ──────────────────────────────────
            for (const pr of prsToProcess) {
              try {
                await evaluatePR(pr);
              } catch (err) {
                console.error(`Error processing PR #${pr.number}: ${err.message}`);
              }
            }
            console.log(`\n✅ Done processing ${prsToProcess.length} PR(s).`);
